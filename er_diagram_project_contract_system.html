
<style>
#erd { padding: 8px 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#EEEDFE' : '#26215C',
    primaryBorderColor: dark ? '#7F77DD' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryTextColor: dark ? '#9FE1CB' : '#085041',
    tertiaryColor: dark ? '#633806' : '#FAEEDA',
    tertiaryTextColor: dark ? '#FAC775' : '#633806',
  },
});

const diagram = `erDiagram
  USERS {
    uint id PK
    string uuid UK
    string email UK
    string password_hash
    string first_name
    string last_name
    string phone
    string user_type
    bool is_active
    uint created_by FK
    timestamp deleted_at
  }
  ROLES {
    uint id PK
    string name UK
    string description
  }
  PERMISSIONS {
    uint id PK
    string resource
    string action
  }
  USER_ROLES {
    uint user_id PK,FK
    uint role_id PK,FK
    uint assigned_by FK
    timestamp assigned_at
  }
  ROLE_PERMISSIONS {
    uint role_id PK,FK
    uint permission_id PK,FK
  }
  EMPLOYEES {
    uint id PK
    uint user_id UK,FK
    string department
    string employee_role
    timestamp hire_date
    decimal salary
  }
  CONTRACTOR_PROFILES {
    uint id PK
    uint user_id UK,FK
    string company_name
    string license_number
    string specialization
    decimal rating
    bool is_verified
  }
  STAKEHOLDER_PROFILES {
    uint id PK
    uint user_id UK,FK
    string organization
    string stakeholder_type
  }
  COMPANIES {
    uint id PK
    string name
    string code UK
    string address
    bool is_active
    uint parent_id FK
    string tenant_id
    timestamp deleted_at
  }
  PROJECTS {
    uint id PK
    string name
    string code UK
    string status
    decimal budget
    timestamp start_date
    timestamp end_date
    uint company_id FK
    uint manager_id FK
    timestamp deleted_at
  }
  PROJECT_PHASES {
    uint id PK
    string name
    int order_number
    string status
    timestamp start_date
    timestamp end_date
    uint project_id FK
  }
  PROJECT_CONTRACTORS {
    uint project_id PK,FK
    uint contractor_profile_id PK,FK
    string role
    uint assigned_by FK
  }
  PROJECT_STAKEHOLDERS {
    uint project_id PK,FK
    uint stakeholder_profile_id PK,FK
    string access_level
    bool notify_on_update
  }
  CONTRACTS {
    uint id PK
    string title
    string contract_number UK
    string status
    string contract_type
    decimal value
    timestamp start_date
    timestamp end_date
    timestamp signed_at
    uint project_id FK
    uint phase_id FK
    timestamp deleted_at
  }
  CONTRACT_CONTRACTORS {
    uint contract_id PK,FK
    uint contractor_profile_id PK,FK
    decimal share_percentage
  }
  WBS_ITEMS {
    uint id PK
    string code
    string title
    string unit
    decimal quantity
    decimal unit_price
    decimal total_price
    int order_number
    uint contract_id FK
    uint parent_id FK
  }
  STATUS_STATEMENTS {
    uint id PK
    int statement_number
    string period
    string status
    decimal total_value
    timestamp submitted_at
    timestamp approved_at
    uint approved_by FK
    uint contract_id FK
  }
  WORK_DONE_ITEMS {
    uint id PK
    decimal quantity_done
    decimal unit_price
    decimal total_value
    decimal cumulative_qty
    uint wbs_item_id FK
    uint status_statement_id FK
  }
  EXTRA_WORK_ITEMS {
    uint id PK
    string description
    decimal quantity
    decimal unit_price
    decimal total_value
    string approval_ref
    uint status_statement_id FK
  }
  DEDUCTIONS {
    uint id PK
    string type
    string description
    decimal amount
    decimal percentage
    uint status_statement_id FK
  }
  AUDIT_LOGS {
    uint id PK
    uint user_id FK
    string action
    string resource
    uint resource_id
    json old_values
    json new_values
    string ip_address
    timestamp created_at
  }

  USERS ||--o{ USER_ROLES : "has"
  ROLES ||--o{ USER_ROLES : "assigned via"
  ROLES ||--o{ ROLE_PERMISSIONS : "has"
  PERMISSIONS ||--o{ ROLE_PERMISSIONS : "granted via"
  USERS ||--o| EMPLOYEES : "specializes as"
  USERS ||--o| CONTRACTOR_PROFILES : "specializes as"
  USERS ||--o| STAKEHOLDER_PROFILES : "specializes as"
  USERS ||--o{ AUDIT_LOGS : "generates"
  COMPANIES ||--o{ COMPANIES : "parent of"
  COMPANIES ||--o{ PROJECTS : "owns"
  EMPLOYEES ||--o{ PROJECTS : "manages"
  PROJECTS ||--o{ PROJECT_PHASES : "has"
  PROJECTS ||--o{ CONTRACTS : "contains"
  PROJECTS ||--o{ PROJECT_CONTRACTORS : "assigns"
  PROJECTS ||--o{ PROJECT_STAKEHOLDERS : "includes"
  CONTRACTOR_PROFILES ||--o{ PROJECT_CONTRACTORS : "participates via"
  CONTRACTOR_PROFILES ||--o{ CONTRACT_CONTRACTORS : "assigned via"
  STAKEHOLDER_PROFILES ||--o{ PROJECT_STAKEHOLDERS : "observes via"
  CONTRACTS ||--o{ CONTRACT_CONTRACTORS : "has"
  CONTRACTS ||--o{ WBS_ITEMS : "defines"
  CONTRACTS ||--o{ STATUS_STATEMENTS : "tracks via"
  WBS_ITEMS ||--o{ WBS_ITEMS : "parent of"
  WBS_ITEMS ||--o{ WORK_DONE_ITEMS : "measured by"
  STATUS_STATEMENTS ||--o{ WORK_DONE_ITEMS : "contains"
  STATUS_STATEMENTS ||--o{ EXTRA_WORK_ITEMS : "contains"
  STATUS_STATEMENTS ||--o{ DEDUCTIONS : "contains"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
