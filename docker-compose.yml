services:
  db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-ctuser}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-ctpass}
      POSTGRES_DB: ${DATABASE_NAME:-ctdatabase}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:-ctuser} -d ${DATABASE_NAME:-ctdatabase}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
